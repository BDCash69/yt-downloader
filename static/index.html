<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Downloader</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d14;
  --surface:   #16162a;
  --surface2:  #1e1e36;
  --border:    #2a2a4a;
  --accent:    #6366f1;
  --accent-h:  #4f46e5;
  --text:      #f0f0f8;
  --muted:     #7878a0;
  --error-bg:  #2a1020;
  --error-bd:  #5c1a30;
  --error-tx:  #fca5a5;
  --warn-bg:   #1e1a0a;
  --warn-bd:   #5c4a10;
  --warn-tx:   #fcd34d;
  --radius:    12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem 1rem 5rem;
}

/* ── Layout ── */
.container { max-width: 820px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 2.5rem; }
.header h1 {
  font-size: 2.25rem;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #a78bfa 60%, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

/* ── Search ── */
.search-row {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.search-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.25rem;
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-row input:focus { border-color: var(--accent); }
.search-row input::placeholder { color: var(--muted); }

/* ── Buttons ── */
.btn {
  padding: 0.9rem 1.5rem;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  transition: background 0.18s, transform 0.15s, opacity 0.15s;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-h); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-sm {
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--accent); border-color: var(--accent); }

/* ── Alerts ── */
.alert {
  border-radius: var(--radius);
  padding: 0.9rem 1.25rem;
  font-size: 0.9rem;
  margin-bottom: 1.25rem;
  display: none;
}
.alert-error { background: var(--error-bg); border: 1px solid var(--error-bd); color: var(--error-tx); }
.alert-warn  { background: var(--warn-bg);  border: 1px solid var(--warn-bd);  color: var(--warn-tx);  }

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  vertical-align: middle;
  margin-right: 0.4rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Results ── */
#results { animation: fadeUp 0.25s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Video card ── */
.video-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: grid;
  grid-template-columns: 220px 1fr;
}
@media (max-width: 560px) { .video-card { grid-template-columns: 1fr; } }

.thumb-wrap { background: #000; aspect-ratio: 16/9; overflow: hidden; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-placeholder { width: 100%; height: 100%; background: var(--surface2); }

.card-info {
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.card-info h2 { font-size: 1.05rem; font-weight: 700; line-height: 1.45; }
.card-meta { color: var(--muted); font-size: 0.82rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
.controls { display: flex; gap: 0.75rem; align-items: center; margin-top: auto; flex-wrap: wrap; }

/* ── Quality select ── */
select.qs {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.5rem 2.25rem 0.5rem 0.875rem;
  color: var(--text);
  font-size: 0.875rem;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'%3e%3cpath stroke='%237878a0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.5rem center;
  background-size: 1.25em;
  transition: border-color 0.15s;
}
select.qs:focus { border-color: var(--accent); }

/* ── Playlist ── */
.playlist-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 0.75rem;
}
.playlist-header h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.35rem; }
.playlist-header .card-meta { margin-bottom: 1rem; }

.playlist-list {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  max-height: 520px;
  overflow-y: auto;
  padding-right: 2px;
}
.playlist-list::-webkit-scrollbar { width: 4px; }
.playlist-list::-webkit-scrollbar-track { background: transparent; }
.playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.plist-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.875rem;
  display: flex;
  align-items: center;
  gap: 0.875rem;
  transition: border-color 0.15s;
}
.plist-item:hover { border-color: var(--accent); }

.plist-num { color: var(--muted); font-size: 0.78rem; min-width: 1.75rem; text-align: right; flex-shrink: 0; }
.plist-thumb {
  width: 88px; height: 49px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
  background: var(--surface2);
}
.plist-title { flex: 1; font-size: 0.88rem; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.plist-dur { color: var(--muted); font-size: 0.78rem; flex-shrink: 0; }

/* ── Playlist checkboxes ── */
.plist-cb {
  flex-shrink: 0;
  appearance: none;
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 5px;
  background: var(--surface2);
  cursor: pointer;
  position: relative;
  transition: background 0.15s, border-color 0.15s;
}
.plist-cb:checked { background: var(--accent); border-color: var(--accent); }
.plist-cb:checked::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}
.plist-item.dimmed { opacity: 0.32; }
.plist-title { cursor: pointer; }

.sel-bar {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.sel-bar .sep { color: var(--border); user-select: none; }
.btn-link {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 0.82rem;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.btn-link:hover { color: var(--accent-h); }

/* ── Progress overlay ── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#overlay.show { display: flex; }

.prog-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 2rem;
  width: min(500px, calc(100vw - 2rem));
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.prog-modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; }
.prog-sub {
  color: var(--muted);
  font-size: 0.82rem;
  margin-bottom: 1.25rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-height: 1.1rem;
}
.prog-track { background: var(--surface2); border-radius: 100px; height: 7px; overflow: hidden; margin-bottom: 0.625rem; }
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #a78bfa);
  border-radius: 100px;
  transition: width 0.35s ease;
  width: 0%;
}
.prog-stats { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; }

.btn-cancel {
  width: 100%;
  padding: 0.65rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 0.875rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn-cancel:hover { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <h1>▶ YT Downloadifier</h1>
    <p>Paste a YouTube video or playlist URL to get started</p>
  </header>

  <div class="search-row">
    <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
    <button class="btn btn-primary" id="fetch-btn" onclick="fetchInfo()">Get Info</button>
  </div>

  <div class="alert alert-warn" id="warn-ffmpeg">
    ⚠ ffmpeg not found in PATH — high-quality downloads (1080p, audio merge) require ffmpeg.
    <a href="https://ffmpeg.org/download.html" target="_blank" style="color:inherit;text-decoration:underline;">Install ffmpeg</a>
  </div>
  <div class="alert alert-error" id="error-box"></div>

  <div id="results"></div>
</div>

<!-- Progress overlay -->
<div id="overlay">
  <div class="prog-modal">
    <h3 id="prog-title">Downloading…</h3>
    <div class="prog-sub" id="prog-sub"></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-stats">
      <span id="prog-pct">0%</span>
      <span id="prog-speed-eta"></span>
    </div>
    <button class="btn-cancel" onclick="cancelDownload()">Cancel</button>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let currentJobId         = null;
let sseSource            = null;
let currentPlaylistTitle = 'playlist';

// ── DOM refs ───────────────────────────────────────────────────────────────
const urlInput  = document.getElementById('url');
const fetchBtn  = document.getElementById('fetch-btn');
const errorBox  = document.getElementById('error-box');
const warnBox   = document.getElementById('warn-ffmpeg');
const resultsEl = document.getElementById('results');

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  try {
    const s = await fetch('/api/status').then(r => r.json());
    if (!s.ffmpeg) warnBox.style.display = 'block';
  } catch (_) {}
})();

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchInfo(); });

// Event delegation for playlist item download buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-dl-url]');
  if (btn) downloadVideo(btn.dataset.dlUrl, btn.dataset.dlQs);
});

// ── Helpers ────────────────────────────────────────────────────────────────
function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}
function clearError() { errorBox.style.display = 'none'; }

function setLoading(on) {
  fetchBtn.disabled = on;
  fetchBtn.innerHTML = on
    ? '<span class="spinner"></span>Fetching…'
    : 'Get Info';
}

function fmtDur(s) {
  if (!s) return '';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function attr(s) { return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function qualitySelect(id) {
  return `<select class="qs" id="${id}">
    <option value="best">Best Quality</option>
    <option value="1080p">1080p HD</option>
    <option value="720p">720p HD</option>
    <option value="480p">480p SD</option>
    <option value="360p">360p Low</option>
    <option value="audio">Audio Only (MP3)</option>
  </select>`;
}

// ── Fetch info ─────────────────────────────────────────────────────────────
async function fetchInfo() {
  const url = urlInput.value.trim();
  if (!url) { showError('Please paste a YouTube URL first.'); return; }

  clearError();
  setLoading(true);
  resultsEl.innerHTML = '';

  try {
    const res  = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || 'Failed to fetch video info.'); return; }
    data.type === 'playlist' ? renderPlaylist(data) : renderVideo(data);
  } catch (e) {
    showError('Network error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

// ── Render single video ────────────────────────────────────────────────────
function renderVideo(d) {
  const dur = fmtDur(d.duration);
  resultsEl.innerHTML = `
    <div class="video-card">
      <div class="thumb-wrap">
        ${d.thumbnail
          ? `<img src="${attr(d.thumbnail)}" alt="" loading="lazy">`
          : '<div class="thumb-placeholder"></div>'}
      </div>
      <div class="card-info">
        <h2>${esc(d.title)}</h2>
        <div class="card-meta">
          ${d.uploader ? `<span>${esc(d.uploader)}</span>` : ''}
          ${dur         ? `<span>${dur}</span>`             : ''}
        </div>
        <div class="controls">
          ${qualitySelect('qs-single')}
          <button class="btn btn-primary"
            data-dl-url="${attr(d.url)}" data-dl-qs="qs-single">⬇ Download</button>
        </div>
      </div>
    </div>`;
}

// ── Render playlist ────────────────────────────────────────────────────────
function renderPlaylist(d) {
  currentPlaylistTitle = d.title;

  const items = d.entries.map((e, i) => {
    const thumb = e.thumbnail || `https://i.ytimg.com/vi/${esc(e.id)}/mqdefault.jpg`;
    const dur   = fmtDur(e.duration);
    return `
      <div class="plist-item" id="plist-item-${i}">
        <input type="checkbox" class="plist-cb" id="cb-${i}"
          data-url="${attr(e.url)}" data-title="${attr(e.title)}"
          checked onchange="onCbChange(this)">
        <span class="plist-num">${i + 1}</span>
        <img class="plist-thumb" src="${attr(thumb)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <label class="plist-title" for="cb-${i}">${esc(e.title)}</label>
        ${dur ? `<span class="plist-dur">${dur}</span>` : ''}
        <button class="btn-sm" data-dl-url="${attr(e.url)}" data-dl-qs="qs-playlist">⬇</button>
      </div>`;
  }).join('');

  resultsEl.innerHTML = `
    <div class="playlist-header">
      <h2>${esc(d.title)}</h2>
      <div class="card-meta">
        <span>${d.count} videos</span>
        ${d.uploader ? `<span>${esc(d.uploader)}</span>` : ''}
      </div>
      <div class="sel-bar">
        <span id="sel-count">${d.count} of ${d.count} selected</span>
        <span class="sep">·</span>
        <button class="btn-link" onclick="setAllChecked(true)">Select all</button>
        <span class="sep">·</span>
        <button class="btn-link" onclick="setAllChecked(false)">Deselect all</button>
      </div>
      <div class="controls">
        ${qualitySelect('qs-playlist')}
        <button class="btn btn-primary" onclick="downloadPlaylist('${attr(d.url)}', 'qs-playlist')">
          ⬇ Download Selected (ZIP)
        </button>
      </div>
    </div>
    <div class="playlist-list">${items}</div>`;
}

function onCbChange(cb) {
  cb.closest('.plist-item').classList.toggle('dimmed', !cb.checked);
  updateSelCount();
}

function setAllChecked(on) {
  document.querySelectorAll('.plist-cb').forEach(cb => {
    cb.checked = on;
    cb.closest('.plist-item').classList.toggle('dimmed', !on);
  });
  updateSelCount();
}

function updateSelCount() {
  const total   = document.querySelectorAll('.plist-cb').length;
  const checked = document.querySelectorAll('.plist-cb:checked').length;
  const el = document.getElementById('sel-count');
  if (el) el.textContent = `${checked} of ${total} selected`;
}

// ── Download single video ──────────────────────────────────────────────────
async function downloadVideo(url, qsId) {
  const quality = document.getElementById(qsId)?.value || 'best';
  showOverlay('Downloading…', 'Starting…');
  try {
    const res  = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, quality }),
    });
    const data = await res.json();
    if (!res.ok) { hideOverlay(); showError(data.detail || 'Download failed.'); return; }
    watchJob(data.job_id);
  } catch (e) {
    hideOverlay();
    showError('Network error: ' + e.message);
  }
}

// ── Download selected playlist items as ZIP ────────────────────────────────
async function downloadPlaylist(url, qsId) {
  const quality  = document.getElementById(qsId)?.value || 'best';
  const checked  = Array.from(document.querySelectorAll('.plist-cb:checked'));

  if (checked.length === 0) {
    showError('No videos selected — check at least one video to download.');
    return;
  }

  const entries = checked.map(cb => ({ url: cb.dataset.url, title: cb.dataset.title }));
  const label   = `${checked.length} video${checked.length !== 1 ? 's' : ''}`;

  showOverlay(`Downloading ${label}…`, 'Starting…');
  try {
    const res  = await fetch('/api/download-playlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, quality, entries, playlist_title: currentPlaylistTitle }),
    });
    const data = await res.json();
    if (!res.ok) { hideOverlay(); showError(data.detail || 'Download failed.'); return; }
    watchJob(data.job_id);
  } catch (e) {
    hideOverlay();
    showError('Network error: ' + e.message);
  }
}

// ── SSE job watcher ────────────────────────────────────────────────────────
function watchJob(jobId) {
  currentJobId = jobId;
  if (sseSource) { sseSource.close(); sseSource = null; }

  sseSource = new EventSource(`/api/download/${jobId}/progress`);

  sseSource.onmessage = ({ data: raw }) => {
    const d = JSON.parse(raw);
    updateOverlay(d);

    if (d.status === 'complete') {
      sseSource.close(); sseSource = null;
      triggerFileDownload(`/api/download/${jobId}/file`, d.filename);
      setTimeout(hideOverlay, 600);
    } else if (d.status === 'error') {
      sseSource.close(); sseSource = null;
      hideOverlay();
      showError('Download failed: ' + d.error);
    }
  };

  sseSource.onerror = () => { sseSource?.close(); sseSource = null; };
}

// ── Overlay helpers ────────────────────────────────────────────────────────
function showOverlay(title, sub) {
  document.getElementById('prog-title').textContent    = title;
  document.getElementById('prog-sub').textContent      = sub;
  document.getElementById('prog-fill').style.width     = '0%';
  document.getElementById('prog-pct').textContent      = '0%';
  document.getElementById('prog-speed-eta').textContent = '';
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
  currentJobId = null;
}

function cancelDownload() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  hideOverlay();
}

function updateOverlay(d) {
  const pct = parseFloat(d.progress) || 0;

  let barPct = pct;
  let title  = 'Downloading…';
  let sub    = d.current_title || '';

  if (d.type === 'playlist') {
    if (d.status === 'zipping') {
      title  = 'Creating ZIP Archive…';
      sub    = `Packaging ${d.current} videos…`;
    } else if (d.total > 0) {
      const overall = ((d.current - 1) / d.total * 100) + (pct / d.total);
      barPct = overall;
      title  = `Video ${d.current} of ${d.total}`;
    }
  }

  document.getElementById('prog-fill').style.width  = barPct + '%';
  document.getElementById('prog-pct').textContent   = Math.round(barPct) + '%';
  document.getElementById('prog-title').textContent = title;
  document.getElementById('prog-sub').textContent   = sub;

  const parts = [d.speed, d.eta ? `ETA: ${d.eta}` : ''].filter(Boolean);
  document.getElementById('prog-speed-eta').textContent = parts.join('  ·  ');
}

// ── Trigger browser file save ──────────────────────────────────────────────
function triggerFileDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  if (filename) a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
